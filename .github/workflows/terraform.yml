name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - "**/*.tfvars.example"
      - "modules/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.tfvars.example"
      - "modules/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "plan, apply, or destroy"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy
      clouds:
        description: "Which clouds to include"
        required: true
        default: aws
        type: choice
        options:
          - aws
          - azure
          - gcp
          - both
          - all

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.14.8"
  AWS_REGION: us-east-1
  TF_VAR_azure_admin_password: ${{ secrets.AZURE_ADMIN_PASSWORD }}
  TF_VAR_azure_location: westus2
  TF_VAR_azure_vm_size: Standard_D2s_v3
  TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_gcp_region: us-central1
  TF_VAR_gcp_zone: us-central1-a
  TF_VAR_gcp_machine_type: e2-micro

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    env:
      TF_VAR_enable_aws: ${{ (github.event_name == 'workflow_dispatch' && (inputs.clouds == 'aws' || inputs.clouds == 'both' || inputs.clouds == 'all')) && 'true' || (github.event_name != 'workflow_dispatch') && 'true' || 'false' }}
      TF_VAR_enable_azure: ${{ (github.event_name == 'workflow_dispatch' && (inputs.clouds == 'azure' || inputs.clouds == 'both' || inputs.clouds == 'all')) && 'true' || (github.event_name != 'workflow_dispatch' && vars.ENABLE_AZURE == 'true') && 'true' || 'false' }}
      TF_VAR_enable_gcp: ${{ (github.event_name == 'workflow_dispatch' && (inputs.clouds == 'gcp' || inputs.clouds == 'all')) && 'true' || (github.event_name != 'workflow_dispatch' && vars.ENABLE_GCP == 'true') && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select active cloud configs
        run: |
          enabled=0
          if [ "$TF_VAR_enable_aws" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_azure" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_gcp" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_azure" != "true" ]; then
            rm -f azure.tf
            sed -i '/azurerm = {/,/}/d' main.tf
          fi
          if [ "$TF_VAR_enable_gcp" != "true" ]; then
            rm -f gcp.tf
            sed -i '/google = {/,/}/d' main.tf
          fi
          if [ "$enabled" -lt 2 ]; then
            rm -f outputs.urls.tf
          fi
          echo "Active .tf files:" && ls -1 *.tf
          echo "--- main.tf required_providers ---"
          sed -n '1,20p' main.tf

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        if: env.TF_VAR_enable_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure login
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Validate cloud secrets
        run: |
          missing=0
          if [ "$TF_VAR_enable_azure" = "true" ] && [ -z "$TF_VAR_azure_subscription_id" ]; then
            echo "::error::Azure is enabled but AZURE_SUBSCRIPTION_ID secret is not set."
            missing=1
          fi
          if [ "$TF_VAR_enable_gcp" = "true" ] && [ -z "$TF_VAR_gcp_project_id" ]; then
            echo "::error::GCP is enabled but GCP_PROJECT_ID secret is not set."
            missing=1
          fi
          if [ "$TF_VAR_enable_aws" = "true" ] && [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "::error::AWS is enabled but AWS_ACCESS_KEY_ID secret is not set."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Show cloud toggles
        run: |
          echo "enable_aws=$TF_VAR_enable_aws enable_azure=$TF_VAR_enable_azure enable_gcp=$TF_VAR_enable_gcp"
          echo "azure_location=$TF_VAR_azure_location azure_vm_size=$TF_VAR_azure_vm_size"
          echo "gcp_region=$TF_VAR_gcp_region gcp_zone=$TF_VAR_gcp_zone"

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
        run: |
          if [ -n "$TF_STATE_BUCKET" ]; then
            ARGS="-backend-config=bucket=$TF_STATE_BUCKET"
            ARGS="$ARGS -backend-config=key=${TF_STATE_KEY:-terraform-basic-project/terraform.tfstate}"
            ARGS="$ARGS -backend-config=region=${TF_STATE_REGION:-us-east-1}"
            ARGS="$ARGS -backend-config=encrypt=true"
            if [ -n "$TF_STATE_DYNAMODB_TABLE" ]; then
              ARGS="$ARGS -backend-config=dynamodb_table=$TF_STATE_DYNAMODB_TABLE"
            fi
            terraform init $ARGS
          else
            echo "::warning::TF_STATE_BUCKET not set — init without remote backend (plan only)."
            terraform init -backend=false
          fi

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.terraform_action }}" = "destroy" ]; then
            terraform plan -destroy -no-color -input=false -out=tfplan
          else
            terraform plan -no-color -input=false -out=tfplan
          fi

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: tfplan
          retention-days: 7

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'apply')
    environment: production
    env:
      TF_VAR_enable_aws: ${{ (github.event_name == 'workflow_dispatch' && (inputs.clouds == 'aws' || inputs.clouds == 'both' || inputs.clouds == 'all')) && 'true' || (github.event_name != 'workflow_dispatch') && 'true' || 'false' }}
      TF_VAR_enable_azure: ${{ (github.event_name == 'workflow_dispatch' && (inputs.clouds == 'azure' || inputs.clouds == 'both' || inputs.clouds == 'all')) && 'true' || (github.event_name != 'workflow_dispatch' && vars.ENABLE_AZURE == 'true') && 'true' || 'false' }}
      TF_VAR_enable_gcp: ${{ (github.event_name == 'workflow_dispatch' && (inputs.clouds == 'gcp' || inputs.clouds == 'all')) && 'true' || (github.event_name != 'workflow_dispatch' && vars.ENABLE_GCP == 'true') && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select active cloud configs
        run: |
          enabled=0
          if [ "$TF_VAR_enable_aws" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_azure" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_gcp" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_azure" != "true" ]; then
            rm -f azure.tf
            sed -i '/azurerm = {/,/}/d' main.tf
          fi
          if [ "$TF_VAR_enable_gcp" != "true" ]; then
            rm -f gcp.tf
            sed -i '/google = {/,/}/d' main.tf
          fi
          if [ "$enabled" -lt 2 ]; then
            rm -f outputs.urls.tf
          fi
          echo "Active .tf files:" && ls -1 *.tf
          echo "--- main.tf required_providers ---"
          sed -n '1,20p' main.tf

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        if: env.TF_VAR_enable_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure login
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
        run: |
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET (and related secrets) before running apply in CI."
            exit 1
          fi
          ARGS="-backend-config=bucket=$TF_STATE_BUCKET"
          ARGS="$ARGS -backend-config=key=${TF_STATE_KEY:-terraform-basic-project/terraform.tfstate}"
          ARGS="$ARGS -backend-config=region=${TF_STATE_REGION:-us-east-1}"
          ARGS="$ARGS -backend-config=encrypt=true"
          if [ -n "$TF_STATE_DYNAMODB_TABLE" ]; then
            ARGS="$ARGS -backend-config=dynamodb_table=$TF_STATE_DYNAMODB_TABLE"
          fi
          terraform init $ARGS

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: .

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Outputs
        run: terraform output

  destroy:
    name: Destroy
    needs: plan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'destroy'
    environment: production
    env:
      TF_VAR_enable_aws: ${{ (inputs.clouds == 'aws' || inputs.clouds == 'both' || inputs.clouds == 'all') && 'true' || 'false' }}
      TF_VAR_enable_azure: ${{ (inputs.clouds == 'azure' || inputs.clouds == 'both' || inputs.clouds == 'all') && 'true' || 'false' }}
      TF_VAR_enable_gcp: ${{ (inputs.clouds == 'gcp' || inputs.clouds == 'all') && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select active cloud configs
        run: |
          enabled=0
          if [ "$TF_VAR_enable_aws" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_azure" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_gcp" = "true" ]; then enabled=$((enabled + 1)); fi
          if [ "$TF_VAR_enable_azure" != "true" ]; then
            rm -f azure.tf
            sed -i '/azurerm = {/,/}/d' main.tf
          fi
          if [ "$TF_VAR_enable_gcp" != "true" ]; then
            rm -f gcp.tf
            sed -i '/google = {/,/}/d' main.tf
          fi
          if [ "$enabled" -lt 2 ]; then
            rm -f outputs.urls.tf
          fi
          echo "Active .tf files:" && ls -1 *.tf
          echo "--- main.tf required_providers ---"
          sed -n '1,20p' main.tf

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        if: env.TF_VAR_enable_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure login
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
        run: |
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET (and related secrets) before running destroy in CI."
            exit 1
          fi
          ARGS="-backend-config=bucket=$TF_STATE_BUCKET"
          ARGS="$ARGS -backend-config=key=${TF_STATE_KEY:-terraform-basic-project/terraform.tfstate}"
          ARGS="$ARGS -backend-config=region=${TF_STATE_REGION:-us-east-1}"
          ARGS="$ARGS -backend-config=encrypt=true"
          if [ -n "$TF_STATE_DYNAMODB_TABLE" ]; then
            ARGS="$ARGS -backend-config=dynamodb_table=$TF_STATE_DYNAMODB_TABLE"
          fi
          terraform init $ARGS

      - name: Download destroy plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: .

      - name: Terraform destroy
        run: terraform apply -auto-approve -input=false tfplan

      - name: Verify empty state
        run: terraform state list
