name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - "**/*.tfvars.example"
      - "modules/**"
      - ".github/workflows/terraform.yml"
      - ".github/scripts/**"
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.tfvars.example"
      - "modules/**"
      - ".github/workflows/terraform.yml"
      - ".github/scripts/**"
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "plan, apply, or destroy"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy
      clouds:
        description: "Cloud(s) to run — pick one, a pair, or all three"
        required: true
        default: all
        type: choice
        options:
          - all
          - aws
          - azure
          - gcp
          - aws-azure
          - aws-gcp
          - azure-gcp

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.14.8"
  AWS_REGION: us-east-1
  TF_VAR_azure_admin_password: ${{ secrets.AZURE_ADMIN_PASSWORD }}
  TF_VAR_azure_location: westus2
  TF_VAR_azure_vm_size: Standard_D2s_v3
  TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_gcp_region: us-central1
  TF_VAR_gcp_zone: us-central1-a
  TF_VAR_gcp_machine_type: e2-micro

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set cloud toggles
        id: clouds
        env:
          ENABLE_ALL_CLOUDS: ${{ vars.ENABLE_ALL_CLOUDS }}
          ENABLE_AZURE: ${{ vars.ENABLE_AZURE }}
          ENABLE_GCP: ${{ vars.ENABLE_GCP }}
        run: |
          chmod +x .github/scripts/cloud-toggles.sh .github/scripts/select-cloud-configs.sh .github/scripts/validate-cloud-secrets.sh
          mapfile -t lines < <(.github/scripts/cloud-toggles.sh \
            "${{ github.event_name }}" \
            "${{ inputs.clouds || 'aws' }}" \
            "$ENABLE_ALL_CLOUDS" \
            "$ENABLE_AZURE" \
            "$ENABLE_GCP")
          for line in "${lines[@]}"; do
            if [[ "$line" == TF_VAR_* ]]; then
              echo "$line" >> "$GITHUB_ENV"
            elif [[ "$line" == enable_* ]]; then
              echo "$line" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Select active cloud configs
        run: .github/scripts/select-cloud-configs.sh

      - name: Validate cloud secrets
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: .github/scripts/validate-cloud-secrets.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure login
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Show cloud toggles
        run: |
          echo "clouds_input=${{ inputs.clouds || 'push-default' }}"
          echo "enable_aws=$TF_VAR_enable_aws enable_azure=$TF_VAR_enable_azure enable_gcp=$TF_VAR_enable_gcp"

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
        run: |
          if [ -n "$TF_STATE_BUCKET" ]; then
            ARGS="-backend-config=bucket=$TF_STATE_BUCKET"
            ARGS="$ARGS -backend-config=key=${TF_STATE_KEY:-terraform-basic-project/terraform.tfstate}"
            ARGS="$ARGS -backend-config=region=${TF_STATE_REGION:-us-east-1}"
            ARGS="$ARGS -backend-config=encrypt=true"
            if [ -n "$TF_STATE_DYNAMODB_TABLE" ]; then
              ARGS="$ARGS -backend-config=dynamodb_table=$TF_STATE_DYNAMODB_TABLE"
            fi
            terraform init $ARGS
          else
            echo "::warning::TF_STATE_BUCKET not set — init without remote backend (plan only)."
            terraform init -backend=false
          fi

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.terraform_action }}" = "destroy" ]; then
            terraform plan -destroy -no-color -input=false -out=tfplan
          else
            terraform plan -no-color -input=false -out=tfplan
          fi

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}-${{ steps.clouds.outputs.enable_aws }}-${{ steps.clouds.outputs.enable_azure }}-${{ steps.clouds.outputs.enable_gcp }}
          path: tfplan
          retention-days: 7

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'apply')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set cloud toggles
        id: clouds
        env:
          ENABLE_ALL_CLOUDS: ${{ vars.ENABLE_ALL_CLOUDS }}
          ENABLE_AZURE: ${{ vars.ENABLE_AZURE }}
          ENABLE_GCP: ${{ vars.ENABLE_GCP }}
        run: |
          chmod +x .github/scripts/cloud-toggles.sh .github/scripts/select-cloud-configs.sh .github/scripts/validate-cloud-secrets.sh
          mapfile -t lines < <(.github/scripts/cloud-toggles.sh \
            "${{ github.event_name }}" \
            "${{ inputs.clouds || 'aws' }}" \
            "$ENABLE_ALL_CLOUDS" \
            "$ENABLE_AZURE" \
            "$ENABLE_GCP")
          for line in "${lines[@]}"; do
            if [[ "$line" == TF_VAR_* ]]; then
              echo "$line" >> "$GITHUB_ENV"
            elif [[ "$line" == enable_* ]]; then
              echo "$line" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Select active cloud configs
        run: .github/scripts/select-cloud-configs.sh

      - name: Validate cloud secrets
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: .github/scripts/validate-cloud-secrets.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure login
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
        run: |
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET (and related secrets) before running apply in CI."
            exit 1
          fi
          ARGS="-backend-config=bucket=$TF_STATE_BUCKET"
          ARGS="$ARGS -backend-config=key=${TF_STATE_KEY:-terraform-basic-project/terraform.tfstate}"
          ARGS="$ARGS -backend-config=region=${TF_STATE_REGION:-us-east-1}"
          ARGS="$ARGS -backend-config=encrypt=true"
          if [ -n "$TF_STATE_DYNAMODB_TABLE" ]; then
            ARGS="$ARGS -backend-config=dynamodb_table=$TF_STATE_DYNAMODB_TABLE"
          fi
          terraform init $ARGS

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}-${{ steps.clouds.outputs.enable_aws }}-${{ steps.clouds.outputs.enable_azure }}-${{ steps.clouds.outputs.enable_gcp }}
          path: .

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Outputs
        run: terraform output

  destroy:
    name: Destroy
    needs: plan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'destroy'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set cloud toggles
        id: clouds
        run: |
          chmod +x .github/scripts/cloud-toggles.sh .github/scripts/select-cloud-configs.sh .github/scripts/validate-cloud-secrets.sh
          mapfile -t lines < <(.github/scripts/cloud-toggles.sh \
            "workflow_dispatch" \
            "${{ inputs.clouds }}" \
            "false" "false" "false")
          for line in "${lines[@]}"; do
            if [[ "$line" == TF_VAR_* ]]; then
              echo "$line" >> "$GITHUB_ENV"
            elif [[ "$line" == enable_* ]]; then
              echo "$line" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Select active cloud configs
        run: .github/scripts/select-cloud-configs.sh

      - name: Validate cloud secrets
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: .github/scripts/validate-cloud-secrets.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure login
        if: env.TF_VAR_enable_azure == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate to Google Cloud
        if: env.TF_VAR_enable_gcp == 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
        run: |
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET (and related secrets) before running destroy in CI."
            exit 1
          fi
          ARGS="-backend-config=bucket=$TF_STATE_BUCKET"
          ARGS="$ARGS -backend-config=key=${TF_STATE_KEY:-terraform-basic-project/terraform.tfstate}"
          ARGS="$ARGS -backend-config=region=${TF_STATE_REGION:-us-east-1}"
          ARGS="$ARGS -backend-config=encrypt=true"
          if [ -n "$TF_STATE_DYNAMODB_TABLE" ]; then
            ARGS="$ARGS -backend-config=dynamodb_table=$TF_STATE_DYNAMODB_TABLE"
          fi
          terraform init $ARGS

      - name: Download destroy plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}-${{ steps.clouds.outputs.enable_aws }}-${{ steps.clouds.outputs.enable_azure }}-${{ steps.clouds.outputs.enable_gcp }}
          path: .

      - name: Terraform destroy
        run: terraform apply -auto-approve -input=false tfplan

      - name: Verify empty state
        run: terraform state list
